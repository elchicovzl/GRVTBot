# G.5 — Log rotation for grvt-grid-bot.
# Install: sudo cp scripts/logrotate.conf /etc/logrotate.d/grvt-grid-bot
#
# Rotates daily, keeps 14 days, compresses old logs.
# The bot writes to /var/log/grvt-grid-bot/ via systemd StandardOutput.

/var/log/grvt-grid-bot/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    dateext
    dateformat -%Y%m%d
}
